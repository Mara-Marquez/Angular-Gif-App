

<div class="h-screen  overflow-y-scroll grid grid-cols-2 md:grid-cols-4 gap-4"
(scroll)="onScroll($event)"
#groupDiv
>
  <div *ngFor="let group of gifService.trendingGifGroup()">
     <div class="grid gap-4">
        <div *ngFor="let gif of group">

        <div>
            <img class="h-full w-full rounded-base object-cover" src="{{gif.url}}" alt="">
        </div>

        </div>
    </div>
  </div>
