<div id="nav" class="w-full px-6">

    <!--bg-blue-800 que se active -->
    <div *ngFor="let item of menuOptions">
            <a 
             [routerLink]="[item.route]" routerLinkActive="active"
             [routerLinkActiveOptions]="{exact:true}"
            class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3  hover:bg-white/5 transition ease-linear duration-150">
                <div>
                
                 <i class="{{item.icon}}"></i>
                      
                </div>
                <div class="flex flex-col">
                    <span class="text-lg font-bold leading-5 text-white">{{item.label}}</span>
                    <span class="text-sm text-white/50 hidden md:block">Data Overview</span>
                </div>
            </a>
    </div>

    <div *ngFor="let item of searchHistoryKeys()">
        <a 
               [routerLink]="['/dashboard/history',item]"
            class=" w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3  hover:bg-white/5 transition ease-linear duration-150">
            <div>
            
                <i class="fa-solid fa-clock-rotate-left"></i>
                    
            </div>
            <div class="flex flex-col">
                <span class=" text-sm font-bold leading-5 text-white">{{item }}</span>
                <span class="text-sm text-white/50 hidden md:block">Data Overview</span>
            </div>
        </a>
    </div>

</div>
